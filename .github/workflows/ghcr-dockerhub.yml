name: Build and Push AkShare-Enhanced Image to GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag version (e.g., v1.0.0, latest)'
        required: true
        default: 'latest'

env:
  GHCR_REGISTRY: ghcr.io
  # GitHub 仓库全名作为 GHCR 镜像名
  GHCR_IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # 必须增加写权限，用于将 patch 后的代码提交回仓库
      packages: write   # 必须有权限推送到 GHCR
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 获取完整历史以确保可以 push 回去

      # === 核心步骤 1: 准备 Python 环境 ===
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # === 核心步骤 2: 运行 AkShare 注入脚本 ===
      # 注意：请确保仓库中存在 scripts/patch_search_service.py
      - name: Apply AkShare Patch
        run: |
          if [ -f "scripts/patch_search_service.py" ]; then
            python scripts/patch_search_service.py
          else
            echo "Error: scripts/patch_search_service.py not found! 正在尝试创建默认脚本..."
            mkdir -p scripts
            # 如果脚本不存在，这里可以输出一个备用的注入逻辑（可选）
          fi

      # === 核心步骤 3: 将注入后的代码同步回 GitHub 仓库 ===
      - name: Commit and Push patched code
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/search_service.py
          if git diff --staged --quiet; then
            echo "No changes to commit (already patched)"
          else
            git commit -m "chore: auto-inject AkShare logic before build [skip ci]"
            git push
          fi

      # === Docker 构建环境准备 ===
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Set up QEMU for multi-platform build
        uses: docker/setup-qemu-action@v3

      # 登录到 GHCR (使用内置的 GITHUB_TOKEN，无需额外配置 Secrets)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 为 GHCR 生成元数据
      - name: Extract metadata for GHCR
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ inputs.image_tag != 'latest' }}
          flavor: |
            latest=true

      # 构建并推送多架构镜像 (AMD64 和 ARM64)
      - name: Build and push multi-arch images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 生成运行总结
      - name: Generate summary
        run: |
          echo "### Docker Image Built and Pushed Successfully 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** GitHub Container Registry (GHCR)" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
